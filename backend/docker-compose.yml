services:
  backend:
    build: .
    container_name: master
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./segments:/app/segments
    depends_on:
      - node-1
      - node-2
      - node-3
      - node-4
      - node-5
      - node-6

  node-1:
    build: ./node-service
    container_name: node-1
    environment:
      - PORT=4001
      - NODE_NAME=node-1
      - STORAGE_DIR=/data/storage
    ports:
      - "4001:4001"
    volumes:
      - ./node-data/node-1:/data/storage

  node-2:
    build: ./node-service
    container_name: node-2
    environment:
      - PORT=4001
      - NODE_NAME=node-2
      - STORAGE_DIR=/data/storage
    ports:
      - "4002:4001"
    volumes:
      - ./node-data/node-2:/data/storage

  node-3:
    build: ./node-service
    container_name: node-3
    environment:
      - PORT=4001
      - NODE_NAME=node-3
      - STORAGE_DIR=/data/storage
    ports:
      - "4003:4001"
    volumes:
      - ./node-data/node-3:/data/storage

  node-4:
    build: ./node-service
    container_name: node-4
    environment:
      - PORT=4001
      - NODE_NAME=node-4
      - STORAGE_DIR=/data/storage
    ports:
      - "4004:4001"
    volumes:
      - ./node-data/node-4:/data/storage

  node-5:
    build: ./node-service
    container_name: node-5
    environment:
      - PORT=4001
      - NODE_NAME=node-5
      - STORAGE_DIR=/data/storage
    ports:
      - "4005:4001"
    volumes:
      - ./node-data/node-5:/data/storage

  node-6:
    build: ./node-service
    container_name: node-6
    environment:
      - PORT=4001
      - NODE_NAME=node-6
      - STORAGE_DIR=/data/storage
    ports:
      - "4006:4001"
    volumes:
      - ./node-data/node-6:/data/storage
